[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=cam --cov-report=term-missing --cov-report=html -v"
asyncio_mode = "auto"

[tool.coverage.run]
source = ["cam"]
omit = ["cam/db/migrations/*"]

[tool.coverage.report]
# Raised to 80 once all modules ship; kept at 0 during bootstrap phase
fail_under = 0
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
