version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: cam
      POSTGRES_PASSWORD: cam
      POSTGRES_DB: cam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cam"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  worker:
    build: .
    command: celery -A cam.tasks:celery_app worker --loglevel=info
    env_file:
      - path: .env
        required: false  # copy .env.example → .env on first checkout
    environment:
      # Docker service-name URLs — always override any localhost values in .env
      # so containers can reach their sibling services on the compose network.
      DATABASE_URL: postgresql://cam:cam@postgres:5432/cam
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  beat:
    build: .
    command: celery -A cam.tasks:celery_app beat --loglevel=info
    env_file:
      - path: .env
        required: false  # copy .env.example → .env on first checkout
    environment:
      DATABASE_URL: postgresql://cam:cam@postgres:5432/cam
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      - worker

volumes:
  postgres_data:
  minio_data:
