# Build and push the CAM Docker image to GitHub Container Registry (GHCR).
#
# The image is tagged as:
#   ghcr.io/<owner>/<repo>:latest       — updated on every push to main
#   ghcr.io/<owner>/<repo>:<sha>        — pinned to the exact commit
#
# Pull and run on a remote host (VPS / EC2):
#   docker pull ghcr.io/<owner>/<repo>:latest
#   docker run --rm \
#     -e DATABASE_URL=postgresql://... \
#     -e EDGAR_USER_AGENT=you@example.com \
#     ghcr.io/<owner>/<repo>:latest \
#     ingest --source all --since 2025-01-01

name: Build and push Docker image

on:
  push:
    branches:
      - main
    paths:
      - "cam/**"
      - "requirements.txt"
      - "Dockerfile"
  workflow_dispatch: {}

jobs:
  build-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
