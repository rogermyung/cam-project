name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cam
          POSTGRES_PASSWORD: cam
          POSTGRES_DB: cam
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://cam:cam@localhost:5432/cam
      REDIS_URL: redis://localhost:6379/0
      EDGAR_USER_AGENT: ci@cam-project.org
      S3_BUCKET: cam-documents
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      API_AUTH_TOKEN: test-token

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run Alembic downgrade (reversibility check)
        run: alembic downgrade -1

      - name: Run Alembic upgrade again
        run: alembic upgrade head

      - name: Run tests
        run: pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
