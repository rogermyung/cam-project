name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ------------------------------------------------------------------
  # Detect which file categories changed so downstream jobs can skip
  # when their inputs haven't changed.
  # ------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      ci: ${{ steps.filter.outputs.ci }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'requirements*.txt'
              - 'pyproject.toml'
            ci:
              - '.github/workflows/**'
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'

  # ------------------------------------------------------------------
  # Lint — runs when Python source or CI config changes.
  # ------------------------------------------------------------------
  lint:
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff — lint
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

  # ------------------------------------------------------------------
  # Test — runs after lint passes, only when Python/CI files change.
  # Emits coverage.xml for SonarQube.
  # ------------------------------------------------------------------
  test:
    needs: [changes, lint]
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cam
          POSTGRES_PASSWORD: cam
          POSTGRES_DB: cam
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://cam:cam@localhost:5432/cam
      REDIS_URL: redis://localhost:6379/0
      EDGAR_USER_AGENT: ci@cam-project.org
      S3_BUCKET: cam-documents
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      API_AUTH_TOKEN: test-token

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run Alembic downgrade (reversibility check)
        run: alembic downgrade -1

      - name: Run Alembic upgrade again
        run: alembic upgrade head

      - name: Run tests
        run: pytest

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

      - name: Upload XML coverage for SonarQube
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  # ------------------------------------------------------------------
  # SonarQube — runs after tests pass.
  # Requires SONAR_TOKEN and SONAR_HOST_URL repository secrets.
  # ------------------------------------------------------------------
  sonar:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarQube needs full git history for blame/new-code

      - name: Download XML coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
