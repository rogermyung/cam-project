name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

# Allow paths-filter to read PR file lists from the GitHub API.
permissions:
  contents: read
  pull-requests: read

jobs:
  # ------------------------------------------------------------------
  # Detect which file categories changed so downstream jobs can skip
  # when their inputs haven't changed.
  # ------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      ci: ${{ steps.filter.outputs.ci }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'requirements*.txt'
              - 'pyproject.toml'
            ci:
              - '.github/workflows/**'
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'

  # ------------------------------------------------------------------
  # Lint — uses python:3.11-slim (Python pre-installed, no setup step).
  # Runs when Python source or CI config changes.
  # ------------------------------------------------------------------
  lint:
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    container: python:3.11-slim

    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff

      - name: Ruff — lint
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

  # ------------------------------------------------------------------
  # Test — uses python:3.11 (full image) for native-extension compat.
  # Runs after lint passes; services are reached by service name.
  # ------------------------------------------------------------------
  test:
    needs: [changes, lint]
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    container: python:3.11

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cam
          POSTGRES_PASSWORD: cam
          POSTGRES_DB: cam
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      # Within a container job, services are reachable by service name.
      DATABASE_URL: postgresql://cam:cam@postgres:5432/cam
      REDIS_URL: redis://redis:6379/0
      EDGAR_USER_AGENT: ci@cam-project.org
      S3_BUCKET: cam-documents
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      API_AUTH_TOKEN: test-token

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run Alembic downgrade (reversibility check)
        run: alembic downgrade -1

      - name: Run Alembic upgrade again
        run: alembic upgrade head

      - name: Run tests
        run: pytest

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

      - name: Upload XML coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  # ------------------------------------------------------------------
  # Semgrep — static analysis after tests pass.
  # Findings are uploaded to the GitHub Security tab (SARIF).
  # No external account or server required.
  # ------------------------------------------------------------------
  semgrep:
    needs: test
    runs-on: ubuntu-latest
    container: python:3.11-slim

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Install semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep --config=auto --sarif --output=semgrep.sarif cam/

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
