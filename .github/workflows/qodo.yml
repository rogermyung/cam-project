name: Qodo Review

# Trigger Qodo's PR review only after the CI workflow completes
# successfully. This ensures tests must pass before the review fires.
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  trigger-review:
    # Only run when CI succeeded and the triggering event was a pull request.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Find open PR for this branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const headBranch = context.payload.workflow_run.head_branch;
            const headOwner = context.payload.workflow_run.head_repository.owner.login;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${headOwner}:${headBranch}`,
              state: 'open',
            });
            if (prs.length > 0) {
              core.setOutput('number', String(prs[0].number));
            } else {
              core.setOutput('number', '');
            }

      - name: Post /review comment to trigger Qodo
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '/review',
            });
