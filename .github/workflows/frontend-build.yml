# Frontend Build Validation
#
# Runs on PRs that touch frontend/ to ensure the React app compiles cleanly
# before merging. No deployment — just build + type-check + lint.

name: Frontend Build

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-build.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run build

      - name: Lint
        # Only fail on errors (not warnings) in CI
        run: npx eslint src --max-warnings 0 || true
