sonar.projectKey=cam-project
sonar.projectName=CAM - Compliance Alert Monitor
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=cam
sonar.tests=tests

# Python version
sonar.python.version=3.11

# Coverage report produced by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Exclude generated migration files from analysis
sonar.exclusions=cam/db/migrations/**

sonar.sourceEncoding=UTF-8
